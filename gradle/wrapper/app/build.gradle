apply plugin: 'com.android.application'

android {
    compileSdk 33
    
    defaultConfig {
        applicationId "com.festival.palla"
        minSdk 11
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt')
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
